<div class="container">
  <h1>Test de connexion Backend</h1>
  
  <!-- ===== FORMULAIRE D'AJOUT ===== -->
  <div class="add-user-form">
    <h2>➕ Ajouter un utilisateur</h2>
    <div class="form-group">
      <input 
        type="text" 
        placeholder="Nom" 
        [(ngModel)]="newUser.name"
        class="form-control">
    </div>
    <div class="form-group">
      <input 
        type="email" 
        placeholder="Email" 
        [(ngModel)]="newUser.email"
        class="form-control">
    </div>
    <button 
      (click)="addUser()" 
      class="btn btn-success"
      [disabled]="!newUser.name || !newUser.email">
      ✅ Ajouter
    </button>
  </div>

  <hr>

  <!-- ===== AFFICHAGE DES UTILISATEURS ===== -->
  <div *ngIf="loading" class="alert alert-info">Chargement...</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  
  <div *ngIf="users.length > 0" class="users-list">
    <h2>Liste des utilisateurs ({{ users.length }})</h2>
    <div class="user-card" *ngFor="let user of users">
      <p><strong>ID:</strong> {{ user.id }}</p>
      <p><strong>Nom:</strong> {{ user.name }}</p>
      <p><strong>Email:</strong> {{ user.email }}</p>
    </div>
  </div>
  
  <div *ngIf="users.length === 0 && !loading" class="alert alert-warning">
    Aucun utilisateur trouvé.
  </div>
  
  <a routerLink="/" class="btn btn-primary">Retour à l'accueil</a>
</div>
